
# R29 FIXED: LOCAL + TRIGGER 공용 안정 버전
# - NEXT_PUBLIC_* 빌드 타임 주입 해결
# - IMAGE TAG 문제 해결 (로컬에서도 동작)
# - Cloud Run 배포 안정화

substitutions:
  _SERVICE_NAME: nox
  _REGION: asia-northeast3
  _AR_REPO: nox-images

  # 🔥 핵심 (이거 안 넣으면 다시 터짐)
  _NEXT_PUBLIC_SUPABASE_URL: "https://piboecawkeqahyqbcize.supabase.co"
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_72UzV9mlHPeECB7GUo8WnQ_OG_-rvH0"
  _NEXT_PUBLIC_SENTRY_DSN: "https://7a50c90bf7761bcd1bbe3504139529cd@o4511291729510400.ingest.us.sentry.io/4511291737702400"

  # 로컬 실행 대비용 (트리거에서는 override 가능)
  _IMAGE_TAG: "manual"

steps:
  # 1️⃣ Docker build
  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest
      - --build-arg=NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - --build-arg=NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - --build-arg=NEXT_PUBLIC_SENTRY_DSN=${_NEXT_PUBLIC_SENTRY_DSN}
      - .

  # 2️⃣ Push
  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}

  # 3️⃣ Deploy
  #
  # 2026-04-30 Cloud Run perf tuning:
  #   기존: 1Gi RAM / 1 CPU / min=0 / concurrency=80
  #   - min=0 → cold start 5~30초 (NOX 운영 시 첫 손님 응대 지연)
  #   - 1 CPU → 14매장 380명 동시 부하 + monitor route 17쿼리 + Claude
  #     Vision (sharp 리사이즈) 동시 처리 시 CPU 100% 막힘
  #   - concurrency 80 → 1 CPU 로는 과부하, 응답 큐잉 발생
  #
  #   권장: 2Gi / 1 CPU / min=1 / concurrency=50
  #   - min=1: cold start 제거 (월 ~$15 추가, 운영 가치 큼)
  #   - 2Gi: monitor 응답 + Vision payload 안정성 (peak memory 보장)
  #   - concurrency 50: 1 CPU 기준 안전 큐 (Vercel/CF 가이드와 일치)
  #
  #   비용 영향: 월 $20~30 추가. 14매장 운영 가치 대비 작음.
  #   더 빠르게: --cpu=2 (월 추가 $30~50), Vision 호출 많을 때 효과 큼.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=2Gi
      # 2026-05-03 R-Speed-x10: cpu 1 → 2.
      #   1 CPU 단일 instance 가 11명 동시 participants POST 처리 시 CPU 큐잉
      #   → 응답 변동 386-672ms. 2 CPU 면 동시 처리 능력 증가, 변동 감소.
      #   비용: 시간당 ~2배. min-instances=1 환경에서 월 추가 ~$30 추정.
      - --cpu=2
      - --min-instances=1
      - --max-instances=10
      # concurrency 50 → 80 (cpu=2 + 캐시 강화로 처리 능력 ↑).
      - --concurrency=80
      - --timeout=300s
      # 2026-04-30: CPU always-allocated (background work / Sentry flush 안정성).
      #   기본은 request-based — 요청 사이 CPU throttle. cron / realtime / sentry
      #   같은 background activity 가 영향받음.
      - --cpu-boost

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:${_IMAGE_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8