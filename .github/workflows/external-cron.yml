# NOX Cron (Cloud Run 전용)
#
# 2026-05-03: vercel.json 제거에 따라 외부 cron 으로 통합.
#   배포 환경은 Google Cloud Run 이므로 Vercel cron 사용 불가.
#   Cloud Scheduler 대신 GitHub Actions schedule 로 처리 — 무료 + 가시성 좋음.
#
# 사전 설정 (GitHub repo Settings → Secrets and variables → Actions):
#   - PROD_BASE_URL    : https://nox.ai.kr
#   - CRON_SECRET      : Cloud Run env 의 CRON_SECRET 와 동일 값
#
# 한도: GitHub Actions 무료 2,000 분/월 (개인 repo). 충분.
#
# 멱등성: 모든 cron endpoint 가 1일 1회 OR 짧은 멱등 윈도우. 재시도 안전.
#
# Schedule 시각은 모두 UTC. 한국시간 (KST) = UTC + 9.

name: NOX Cron

on:
  schedule:
    # ───── 고빈도 (5분 간격) ─────────────────────────────────────
    - cron: "*/5 * * * *"  # ops-alerts-scan + ble-attendance-sync + ble-session-inference

    # ───── 일 1회 (UTC) ────────────────────────────────────────
    - cron: "0 3 * * *"    # 12:00 KST — ble-history-reaper
    - cron: "0 6 * * *"    # 15:00 KST — (예비)
    - cron: "0 8 * * *"    # 17:00 KST — settlement-tree-advance
    - cron: "0 18 * * *"   # 03:00 KST — audit-archive
    - cron: "0 19 * * *"   # 04:00 KST — system-errors-cleanup + paper-ledger-expire

  # 수동 실행 (디버깅 / 1회성 강제)
  workflow_dispatch:
    inputs:
      target:
        description: 'cron endpoint name (e.g. audit-archive)'
        required: true
        type: choice
        options:
          - all-high-freq
          - ops-alerts-scan
          - ble-attendance-sync
          - ble-session-inference
          - ble-history-reaper
          - settlement-tree-advance
          - audit-archive
          - system-errors-cleanup
          - paper-ledger-expire
          - watchdog

jobs:
  high-freq:
    if: github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ops-alerts-scan
        run: |
          curl -fsS -X GET "$BASE_URL/api/cron/ops-alerts-scan" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions-cron"
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: ble-attendance-sync
        run: |
          curl -fsS -X GET "$BASE_URL/api/cron/ble-attendance-sync" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions-cron"
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: ble-session-inference
        run: |
          curl -fsS -X GET "$BASE_URL/api/cron/ble-session-inference" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions-cron"
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: watchdog
        run: |
          curl -fsS -X GET "$BASE_URL/api/cron/watchdog" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions-cron" || true
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  daily-12-kst:
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ble-history-reaper
        run: |
          curl -fsS -X GET "$BASE_URL/api/cron/ble-history-reaper" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions-cron"
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  daily-17-kst:
    if: github.event_name == 'schedule' && github.event.schedule == '0 8 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: settlement-tree-advance
        run: |
          curl -fsS -X GET "$BASE_URL/api/cron/settlement-tree-advance" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions-cron"
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  daily-03-kst:
    if: github.event_name == 'schedule' && github.event.schedule == '0 18 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: audit-archive
        run: |
          curl -fsS -X GET "$BASE_URL/api/cron/audit-archive" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions-cron"
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  daily-04-kst:
    if: github.event_name == 'schedule' && github.event.schedule == '0 19 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: system-errors-cleanup
        run: |
          curl -fsS -X GET "$BASE_URL/api/cron/system-errors-cleanup" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions-cron"
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: paper-ledger-expire
        run: |
          curl -fsS -X GET "$BASE_URL/api/cron/paper-ledger-expire" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions-cron"
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch single endpoint
        run: |
          TARGET="${{ github.event.inputs.target }}"
          case "$TARGET" in
            all-high-freq)
              for p in ops-alerts-scan ble-attendance-sync ble-session-inference watchdog; do
                echo "→ $p"
                curl -fsS -X GET "$BASE_URL/api/cron/$p" \
                  -H "Authorization: Bearer $CRON_SECRET" \
                  -H "User-Agent: github-actions-cron-manual"
                echo
              done
              ;;
            *)
              curl -fsS -X GET "$BASE_URL/api/cron/$TARGET" \
                -H "Authorization: Bearer $CRON_SECRET" \
                -H "User-Agent: github-actions-cron-manual"
              ;;
          esac
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
